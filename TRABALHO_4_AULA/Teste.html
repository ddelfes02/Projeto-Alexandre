
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Telemetria da Moto</title>


    <!--Estilização do site-->
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            }

    .dashboard{
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
              }

    .painel-dados {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
                  }

    .pista {
            width: 100%;
            height: 100px;
            background-color: #333;
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            margin-bottom: 20px;
            --velocidadeAnimacao: 1s;
            }

    .pista::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 100%;

            background: linear-gradient(
                90deg,
                    #333 0%,
                    #333 50%,
                    #555 50%,
                    #555 100%
     );

    background-size: 40px 100%;

    /* Parte da estilização que faz a animação */
    animation: rolarPista var(--velocidadeAnimacao) linear infinite;
    }

    .moto {
            position: absolute;
            bottom: 20px;
            left: 270px;
            font-size: 50px;
            z-index: 2;
          }

    @keyframes rolarPista {
    0% {
    transform: translateX(0);
    }
    100% {
    transform: translateX(-40px);
     }
    }
    </style>
</head>

<body>

    <!--Div onde mostra os dados e as animações-->
    <div class="dashboard">
        <div class="painel-dados">
            <p>Velocidade: <span id="velocidade">0</span> km/h</p>
                <p>RPM: <span id="rpm">0</span></p>
    </div>

    <div class="pista">
         <div class="moto">🏍️</div>
    </div>

    </div>

    <script>

        // Função responsável por consumir a API interna e atualizar a interface de forma assíncrona     

        function atualizarDados() {

        fetch('Buscar.php')
            .then(response => response.json())
            .then(data => {

        //Esta função pega os valores de rpm e velocidade e os envia para o html
        document.getElementById('velocidade').innerText = data.velocidade;

        document.getElementById('rpm').innerText = data.rpm;

        let velocidade = parseInt(data.velocidade) || 0;

        let rpm = parseInt(data.rpm) || 0;

        const pista = document.querySelector('.pista');

        //Esta função calcula a duração da animação da pista de acordo com o rpm e velocidade
        if (velocidade > 0 || rpm > 0) {

            let fator = (velocidade / 30) + (rpm / 3000);

            let duracao = Math.max(0.1, 2 - fator);

             pista.style.setProperty('--velocidadeAnimacao',`${duracao}s`);

            } else {
            pista.style.setProperty('--velocidadeAnimacao','2s');
            }

            })

            .catch(error => {

            console.log(
            "Falha na requisição dos dados:",error);

            });
        }

        // Inicialização do ciclo de atualização
        atualizarDados();
        setInterval(atualizarDados,1000);  // Ciclo de repetição fixado em 1 segundo.

    </script>

</body>
</html>
